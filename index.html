<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamsoft Test — DataMatrix Scan Validation</title>
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.4.2001/dist/dbr.bundle.js"></script>
<style>
  body{
    margin:0; background:#0a0c10; color:#eef1f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh; padding:20px; box-sizing:border-box;
  }
  h1{font-size:18px; margin-bottom:4px;}
  p.sub{color:#8b94a3; font-size:13px; margin-top:0; margin-bottom:20px;}
  button{
    width:100%; padding:16px; border-radius:12px; border:1px solid #4fd1c5;
    background:rgba(79,209,197,0.12); color:#4fd1c5; font-size:16px; font-weight:700;
  }
  #resultBox{
    margin-top:20px; padding:16px; border-radius:12px; background:#12151b;
    border:1px solid #232934; min-height:60px; font-size:14px; word-break:break-all;
  }
  #resultBox.success{border-color:#4fd1c5; background:rgba(79,209,197,0.08);}
  #resultBox.empty{color:#5a6372;}
  .label{font-size:11px; color:#8b94a3; text-transform:uppercase; font-weight:700; margin-bottom:6px;}
  .scancount{margin-top:14px; font-size:13px; color:#8b94a3;}
</style>
</head>
<body>
  <h1>🔬 Dynamsoft Scan Test</h1>
  <p class="sub">Testing real GS1 DataMatrix decode on your device before committing to anything. No account, no payment — using the built-in 24-hour trial license.</p>

  <button onclick="runTest()">📷 Start Test Scan</button>

  <div id="resultBox" class="empty">Tap above, point at a real medicine box code, and hold steady. Result will appear here.</div>
  <div class="scancount" id="scanCount"></div>

<script>
let attemptCount = 0;

async function runTest(){
  attemptCount++;
  document.getElementById('scanCount').textContent = `Attempt #${attemptCount}`;
  const resultBox = document.getElementById('resultBox');
  resultBox.className = '';
  resultBox.textContent = 'Opening camera…';

  try{
    const scanner = new Dynamsoft.BarcodeScanner();
    const result = await scanner.launch();

    if(result && result.barcodeResults && result.barcodeResults.length > 0){
      const item = result.barcodeResults[0];
      resultBox.className = 'success';
      resultBox.innerHTML = `
        <div class="label">Decoded successfully</div>
        <div><strong>Format:</strong> ${item.formatString || 'unknown'}</div>
        <div><strong>Raw text:</strong> ${escapeHtml(item.text)}</div>
      `;
    } else {
      resultBox.className = '';
      resultBox.textContent = 'No barcode result returned (scanner closed without a match).';
    }
  }catch(e){
    console.error(e);
    resultBox.className = '';
    resultBox.textContent = 'Error: ' + (e.message || e);
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
