<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScanCount — Pharmacy Inventory</title>
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.4.2001/dist/dbr.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0a0c10; --panel:#12151b; --panel2:#171b22; --border:#232934;
    --text:#eef1f5; --sub:#8b94a3; --accent:#4fd1c5; --accent2:#38b8ac;
    --danger:#ef5c5c; --warn:#e8b84b; --radius:14px;
    --content-max:520px; --content-max-desktop:1280px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh; padding-bottom:90px;
  }
  .app{max-width:var(--content-max); margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  header{
    padding:14px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; position:sticky; top:0;
    background:rgba(10,12,16,0.96); backdrop-filter:blur(10px); z-index:30;
    gap:12px;
  }
  .headerleft{display:flex; align-items:center; gap:10px; min-width:0;}
  .hospitallogo{height:34px; width:auto; max-width:120px; object-fit:contain; flex-shrink:0; border-radius:4px;}
  .headertitles{display:flex; flex-direction:column; min-width:0;}
  header h1{font-size:16px; margin:0; font-weight:700; letter-spacing:0.2px; white-space:nowrap;}
  header h1 span{color:var(--accent);}
  .hospitalname{font-size:10px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .headerright{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .staffchip{
    font-size:12px; color:var(--sub); background:var(--panel2); border:1px solid var(--border);
    padding:5px 10px; border-radius:20px; display:flex; align-items:center; gap:6px; cursor:pointer; white-space:nowrap;
  }
  .dot{width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0;}

  /* ---- sticky scan toolbar (sits right under header, scan button always reachable) ---- */
  .scantoolbar{
    position:sticky; top:62px; z-index:25; background:var(--bg);
    padding:10px 16px; border-bottom:1px solid var(--border);
  }

  /* ---- PIN screen ---- */
  .pinscreen{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;}
  .pinscreen h2{font-size:20px; margin-bottom:4px;}
  .pinscreen p{color:var(--sub); font-size:13px; margin-top:0; margin-bottom:24px;}
  .pindots{display:flex; gap:14px; margin-bottom:28px;}
  .pindots .pd{width:14px; height:14px; border-radius:50%; border:2px solid var(--border); transition:0.15s;}
  .pindots .pd.filled{background:var(--accent); border-color:var(--accent);}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:100%; max-width:300px;}
  .keypad button{
    aspect-ratio:1; border-radius:50%; border:1px solid var(--border); background:var(--panel2);
    color:var(--text); font-size:22px; font-weight:600;
  }
  .keypad button:active{background:var(--accent); border-color:var(--accent); color:#06201d;}
  .keypad .ghost{background:transparent; border:none;}
  .pinerr{color:var(--danger); font-size:13px; height:18px; margin-bottom:6px;}

  /* ---- main views ---- */
  main{flex:1; padding:16px 16px 0;}
  .tabs{display:flex; gap:8px; padding:0 16px 12px; position:sticky; top:112px; background:var(--bg); z-index:24;}
  .tab{flex:1; text-align:center; padding:9px 0; border-radius:10px; font-size:13px; font-weight:600; color:var(--sub); border:1px solid var(--border); background:var(--panel2); cursor:pointer;}
  .tab.active{color:#06201d; background:var(--accent); border-color:var(--accent);}

  .scanbtn{
    width:100%; padding:18px; border-radius:var(--radius); border:1px solid var(--accent);
    background:linear-gradient(180deg, rgba(79,209,197,0.16), rgba(79,209,197,0.05));
    color:var(--accent); font-size:16px; font-weight:700; display:flex; align-items:center;
    justify-content:center; gap:10px; cursor:pointer;
  }
  .scanbtn svg{width:22px; height:22px;}

  .card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; cursor:pointer; transition:border-color 0.15s;}
  .card:hover{border-color:var(--accent2);}
  .row{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .medname{font-weight:700; font-size:15px;}
  .pid{color:var(--sub); font-size:11px; font-weight:600; margin-top:2px;}
  .qty{font-size:20px; font-weight:800; color:var(--accent);}
  .meta{color:var(--sub); font-size:12px; margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .meta .exp.soon{color:var(--warn); font-weight:600;}
  .meta .exp.expired{color:var(--danger); font-weight:600;}
  .editedbadge{font-size:10px; color:var(--accent); background:rgba(79,209,197,0.12); padding:2px 7px; border-radius:8px; font-weight:700;}
  .duplicatebadge{font-size:10px; color:var(--warn); background:rgba(232,184,75,0.12); padding:2px 7px; border-radius:8px; font-weight:700;}

  .empty{text-align:center; color:var(--sub); padding:50px 20px; font-size:14px;}
  .searchbar{
    width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--border);
    background:var(--panel2); color:var(--text); font-size:14px; margin-bottom:12px;
  }
  .searchbar::placeholder{color:#5a6372;}

  .filterrow{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;}
  .filterchip{
    font-size:12px; padding:6px 12px; border-radius:16px; border:1px solid var(--border);
    background:var(--panel2); color:var(--sub); cursor:pointer; font-weight:600; white-space:nowrap;
  }
  .filterchip.active{color:#06201d; background:var(--accent); border-color:var(--accent);}

  .statsrow{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px;}
  .statbox{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;}
  .statbox .num{font-size:20px; font-weight:800; color:var(--accent);}
  .statbox.warn .num{color:var(--warn);}
  .statbox.danger .num{color:var(--danger);}
  .statbox .lbl{font-size:10px; color:var(--sub); text-transform:uppercase; font-weight:700; margin-top:2px;}

  /* ---- scanner overlay ---- */
  .scanner{position:fixed; inset:0; background:#000; z-index:100; display:flex; flex-direction:column;}
  .scanner video{flex:1; width:100%; object-fit:cover;}
  .scanner-frame{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:78%; max-width:340px; aspect-ratio:1; border:2px solid var(--accent); border-radius:18px;
    box-shadow:0 0 0 2000px rgba(0,0,0,0.45); z-index:5; pointer-events:none;
  }
  .scanner-top{position:absolute; top:0; left:0; right:0; padding:18px; display:flex; justify-content:space-between; align-items:center; z-index:6;}
  .scanner-top button{background:rgba(255,255,255,0.12); border:none; color:#fff; padding:9px 16px; border-radius:20px; font-size:14px;}
  .scanner-hint{position:absolute; bottom:30px; left:0; right:0; text-align:center; color:#fff; font-size:13px; opacity:0.85; padding:0 30px; z-index:6;}
  .scanner-status{position:absolute; bottom:80px; left:0; right:0; text-align:center; color:var(--accent); font-size:13px; font-weight:600; z-index:6;}

  /* ---- sheet / modal ---- */
  .sheet-backdrop{position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; display:flex; align-items:flex-end;}
  .sheet{background:var(--panel); border-radius:20px 20px 0 0; padding:22px 20px 28px; width:100%; max-width:520px; margin:0 auto; border:1px solid var(--border); border-bottom:none; max-height:88vh; overflow-y:auto;}
  .sheet h3{margin:0 0 4px; font-size:17px;}
  .sheet .hint{color:var(--sub); font-size:13px; margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--sub); margin-bottom:6px; font-weight:600;}
  .field input{
    width:100%; padding:13px 14px; border-radius:10px; border:1px solid var(--border);
    background:var(--panel2); color:var(--text); font-size:16px;
  }
  .field input:focus{outline:none; border-color:var(--accent);}
  .field .static{padding:13px 14px; background:var(--panel2); border-radius:10px; border:1px solid var(--border); font-size:15px;}
  .btnrow{display:flex; gap:10px; margin-top:18px;}
  .btn{flex:1; padding:14px; border-radius:10px; border:none; font-size:15px; font-weight:700;}
  .btn.primary{background:var(--accent); color:#06201d;}
  .btn.primary:disabled{opacity:0.4;}
  .btn.secondary{background:var(--panel2); color:var(--text); border:1px solid var(--border);}
  .btn.danger{background:rgba(239,92,92,0.12); color:var(--danger); border:1px solid rgba(239,92,92,0.3);}

  /* ---- catalog search/pick ---- */
  .catsearch{position:relative; margin-bottom:10px;}
  .catresults{max-height:260px; overflow-y:auto; border:1px solid var(--border); border-radius:10px; background:var(--panel2);}
  .catitem{padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer;}
  .catitem:last-child{border-bottom:none;}
  .catitem:active, .catitem:hover{background:rgba(79,209,197,0.1);}
  .catitem .ctitle{font-size:14px; font-weight:600;}
  .catitem .cid{font-size:11px; color:var(--sub); margin-top:2px;}
  .catpicked{
    background:rgba(79,209,197,0.1); border:1px solid var(--accent); border-radius:10px; padding:13px 14px;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .catpicked .changebtn{color:var(--accent); font-size:12px; font-weight:700; background:none; border:none; flex-shrink:0; cursor:pointer;}

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--accent); color:#06201d;
    padding:12px 22px; border-radius:30px; font-size:14px; font-weight:700; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,0.4);
    animation:toastIn 0.2s ease;
  }
  @keyframes toastIn{from{opacity:0; transform:translate(-50%,10px);} to{opacity:1; transform:translate(-50%,0);}}

  .actionbar{
    position:fixed; bottom:0; left:0; right:0; max-width:var(--content-max); margin:0 auto;
    background:rgba(10,12,16,0.95); backdrop-filter:blur(10px); border-top:1px solid var(--border);
    padding:12px 16px; display:flex; gap:10px; z-index:30;
  }
  .actionbar button{flex:1; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--panel2); color:var(--text); font-size:13px; font-weight:600; cursor:pointer;}
  .actionbar button.exportbtn{color:var(--accent); border-color:var(--accent);}

  .copyrightfooter{
    text-align:center; color:var(--sub); font-size:11px; padding:18px 16px 86px; line-height:1.6;
  }
  .copyrightfooter strong{color:#aab2c0; font-weight:600;}

  .loading{display:flex; align-items:center; justify-content:center; gap:8px; color:var(--sub); padding:30px; font-size:13px;}
  .spinner{width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .errscreen{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; text-align:center;}
  .errscreen h2{margin-bottom:6px; color:var(--danger);}
  .errscreen p{color:var(--sub); font-size:13px; max-width:380px;}

  /* ---- edit modal extras ---- */
  .historylist{margin-top:6px;}
  .historyitem{padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; color:var(--sub);}
  .historyitem:last-child{border-bottom:none;}
  .historyitem strong{color:var(--text);}

  /* ---- DESKTOP RESPONSIVE LAYOUT ---- */
  @media (min-width: 900px){
    :root{ --content-max:var(--content-max-desktop); }
    body{ padding-bottom:0; }
    .app{ padding:0 24px; }
    header{ padding:16px 0; }
    .scantoolbar{ top:66px; padding:14px 0; }
    .tabs{ top:128px; padding:0 0 14px; max-width:340px; }
    main{ padding:20px 0 40px; display:grid; grid-template-columns:340px 1fr; gap:24px; align-items:start; }
    main.singlecol{ display:block; }
    #main{ grid-column:1; }
    .listgrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(380px,1fr)); gap:12px; }
    .listgrid .card{ margin-bottom:0; }
    .statsrow{ grid-template-columns:repeat(3,1fr); max-width:600px; }
    .actionbar{ position:static; max-width:none; background:transparent; backdrop-filter:none; border-top:none; padding:0; margin-top:20px; justify-content:flex-end; }
    .actionbar button{ flex:none; padding:10px 20px; }
    .copyrightfooter{ padding:24px 0; text-align:left; border-top:1px solid var(--border); margin-top:30px; }
    .scanbtn{ padding:14px; }
  }
</style>

</head>
<body>
<div class="app" id="app">
  <div class="loading"><div class="spinner"></div> Loading…</div>
</div>

<script>
/* ======================= CONFIG ======================= */
// Pre-configured for Dr. Baydon's Supabase project.
const SUPABASE_URL = 'https://ythuumovzyrposucuvpv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0aHV1bW92enlycG9zdWN1dnB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDQxMDksImV4cCI6MjA5Nzk4MDEwOX0.PvX8jaYGu66g6sXjslVJ5CAiS_x7vsSLBzBnKjvy9Uo';

let sb = null;
let currentStaff = null;
let pendingPin = '';
let activeTab = 'scan';
let lastScanTime = 0;
let pickedCatalogItem = null; // {product_id, product_title} chosen during "new product" flow

const EXPIRY_WARN_DAYS = 90;

/* ======================= INIT ======================= */
async function boot(){
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    // quick connectivity check
    const { error } = await sb.from('staff').select('id').limit(1);
    if(error) throw error;
  }catch(e){
    console.error(e);
    renderErrorScreen(e.message || 'Could not connect to the database.');
    return;
  }
  currentStaff = JSON.parse(sessionStorage.getItem('sc_staff') || 'null');
  if(currentStaff){
    renderMain();
  } else {
    renderPinScreen();
  }
}
function renderErrorScreen(msg){
  document.getElementById('app').innerHTML = `
    <div class="errscreen">
      <h2>⚠️ Connection error</h2>
      <p>${escapeHtml(msg)}</p>
      <p style="margin-top:14px;">Check that setup.sql and catalog_import.sql have both been run in your Supabase project.</p>
    </div>`;
}

/* ======================= PIN LOGIN ======================= */
function renderPinScreen(){
  pendingPin = '';
  document.getElementById('app').innerHTML = `
    <div class="pinscreen">
      <h2>🔒 Enter your PIN</h2>
      <p>ScanCount — Pharmacy Inventory</p>
      <div class="pinerr" id="pinerr"></div>
      <div class="pindots" id="pindots">
        ${[0,1,2,3].map(()=>'<div class="pd"></div>').join('')}
      </div>
      <div class="keypad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinPress('${n}')">${n}</button>`).join('')}
        <button class="ghost"></button>
        <button onclick="pinPress('0')">0</button>
        <button onclick="pinBackspace()">⌫</button>
      </div>
    </div>`;
}
function updatePinDots(){
  const dots = document.querySelectorAll('#pindots .pd');
  dots.forEach((d,i)=> d.classList.toggle('filled', i < pendingPin.length));
}
async function pinPress(d){
  if(pendingPin.length >= 4) return;
  pendingPin += d;
  updatePinDots();
  if(pendingPin.length === 4) await tryPinLogin();
}
function pinBackspace(){
  pendingPin = pendingPin.slice(0,-1);
  updatePinDots();
  document.getElementById('pinerr').textContent = '';
}
async function tryPinLogin(){
  const { data, error } = await sb.from('staff').select('*').eq('pin', pendingPin).maybeSingle();
  if(error || !data){
    document.getElementById('pinerr').textContent = 'Incorrect PIN';
    pendingPin = '';
    updatePinDots();
    return;
  }
  currentStaff = { id: data.id, name: data.name };
  sessionStorage.setItem('sc_staff', JSON.stringify(currentStaff));
  renderMain();
}
function logout(){
  sessionStorage.removeItem('sc_staff');
  currentStaff = null;
  renderPinScreen();
}

/* ======================= MAIN UI ======================= */
const HOSPITAL_LOGO_URL = 'https://alahlimedical.com.sa/images/1775149380.png';
const HOSPITAL_NAME = 'Al Ahli Medical';

function renderMain(){
  document.getElementById('app').innerHTML = `
    <header>
      <div class="headerleft">
        <img class="hospitallogo" src="${HOSPITAL_LOGO_URL}" alt="${escapeHtml(HOSPITAL_NAME)}" onerror="this.style.display='none'">
        <div class="headertitles">
          <h1>Scan<span>Count</span></h1>
          <div class="hospitalname">${escapeHtml(HOSPITAL_NAME)}</div>
        </div>
      </div>
      <div class="headerright">
        <div class="staffchip" onclick="logout()"><span class="dot"></span> ${escapeHtml(currentStaff.name)} ▾</div>
      </div>
    </header>
    <div class="scantoolbar">
      <button class="scanbtn" onclick="openScanner()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10"/></svg>
        Scan Medicine or Cosmetic Code
      </button>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='scan'?'active':''}" onclick="switchTab('scan')">Recent</div>
      <div class="tab ${activeTab==='list'?'active':''}" onclick="switchTab('list')">Live List</div>
      <div class="tab ${activeTab==='activity'?'active':''}" onclick="switchTab('activity')">Activity</div>
    </div>
    <main id="main"></main>
    <div class="actionbar">
      <button onclick="confirmClearAll()">🗑 Clear All</button>
      <button class="exportbtn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="copyrightfooter">
      © ${new Date().getFullYear()} ScanCount — Pharmacy Inventory System.<br>
      Created by <strong>Dr. Mohamed Baydon</strong> &amp; <strong>Dr. Mahmoud Abdin</strong>.
    </div>
  `;
  renderTabContent();
}
function switchTab(tab){ activeTab = tab; renderMain(); }

async function renderTabContent(){
  const main = document.getElementById('main');
  if(activeTab === 'scan'){
    main.innerHTML = `<div id="recentWrap"></div>`;
    renderRecentScans();
  } else if(activeTab === 'list'){
    main.innerHTML = `
      <div class="statsrow" id="statsRow"></div>
      <input class="searchbar" id="searchbox" placeholder="Search by name or product ID…" oninput="renderLiveList()">
      <div class="filterrow">
        <div class="filterchip active" data-filter="all" onclick="setListFilter('all')">All</div>
        <div class="filterchip" data-filter="expiring" onclick="setListFilter('expiring')">⚠ Expiring Soon</div>
        <div class="filterchip" data-filter="expired" onclick="setListFilter('expired')">⛔ Expired</div>
        <div class="filterchip" data-filter="edited" onclick="setListFilter('edited')">✎ Edited</div>
      </div>
      <div id="liveListWrap"><div class="loading"><div class="spinner"></div> Loading counts…</div></div>
    `;
    renderLiveList();
  } else {
    main.innerHTML = `<div id="activityWrap"><div class="loading"><div class="spinner"></div> Loading activity…</div></div>`;
    renderActivity();
  }
}

async function renderRecentScans(){
  const { data, error } = await sb.from('stock_counts').select('*').order('scanned_at', { ascending:false }).limit(8);
  const wrap = document.getElementById('recentWrap');
  if(!wrap) return;
  if(error){ wrap.innerHTML = `<div class="empty">Could not load recent scans.</div>`; return; }
  if(!data || data.length===0){ wrap.innerHTML = `<div class="empty">No scans yet. Tap the scan button above to start.</div>`; return; }
  const dupGtins = findDuplicateGtins(data);
  wrap.innerHTML = `<div style="color:var(--sub); font-size:12px; margin:6px 0 8px; font-weight:600;">RECENT SCANS — tap any entry to edit</div>` +
    data.map(row => entryCard(row, dupGtins.has(row.gtin))).join('');
}

let listFilter = 'all';
function setListFilter(f){
  listFilter = f;
  document.querySelectorAll('.filterchip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  renderLiveList();
}

async function renderLiveList(){
  const wrap = document.getElementById('liveListWrap');
  if(!wrap) return;
  const search = (document.getElementById('searchbox')?.value || '').toLowerCase();
  const { data, error } = await sb.from('stock_counts').select('*');
  if(error){ wrap.innerHTML = `<div class="empty">Could not load list.</div>`; return; }
  renderStatsRow(data || []);
  if(!data || data.length===0){ wrap.innerHTML = `<div class="empty">Nothing counted yet.</div>`; return; }

  const grouped = {};
  data.forEach(row=>{
    const key = row.product_id;
    if(!grouped[key]) grouped[key] = { product_id:row.product_id, name:row.product_title, qty:0, earliestExpiry:null, count:0, anyEdited:false, rows:[] };
    grouped[key].qty += Number(row.quantity);
    grouped[key].count += 1;
    grouped[key].rows.push(row);
    if(row.edited_by) grouped[key].anyEdited = true;
    if(row.expiry_date){
      if(!grouped[key].earliestExpiry || row.expiry_date < grouped[key].earliestExpiry){
        grouped[key].earliestExpiry = row.expiry_date;
      }
    }
  });
  let rows = Object.values(grouped);

  if(listFilter === 'expiring'){
    rows = rows.filter(r => { const b = expiryBadge(r.earliestExpiry); return b && b.cls === 'soon'; });
  } else if(listFilter === 'expired'){
    rows = rows.filter(r => { const b = expiryBadge(r.earliestExpiry); return b && b.cls === 'expired'; });
  } else if(listFilter === 'edited'){
    rows = rows.filter(r => r.anyEdited);
  }

  if(search) rows = rows.filter(r=> r.name.toLowerCase().includes(search) || String(r.product_id).includes(search));
  rows.sort((a,b)=>a.name.localeCompare(b.name));

  if(rows.length===0){ wrap.innerHTML = `<div class="empty">No matches for this filter.</div>`; return; }

  wrap.innerHTML = `<div class="listgrid">` + rows.map(r=>{
    const expInfo = expiryBadge(r.earliestExpiry);
    // Grouped card opens an edit picker if there's only one underlying row, otherwise opens the most recent for editing
    const editTarget = r.rows.length === 1 ? r.rows[0].id : r.rows.sort((a,b)=>new Date(b.scanned_at)-new Date(a.scanned_at))[0].id;
    return `
      <div class="card" onclick="openEditSheet('${editTarget}')">

  }).join('') + `</div>`;
}

// Flags GTINs scanned more than once within a 10-minute window — a common accidental double-count
// during a team stock-take when two staff members scan the same box without realizing.
function findDuplicateGtins(rows){
  const byGtin = {};
  rows.forEach(r => { (byGtin[r.gtin] = byGtin[r.gtin] || []).push(r); });
  const dups = new Set();
  Object.values(byGtin).forEach(group=>{
    if(group.length < 2) return;
    const sorted = group.slice().sort((a,b)=> new Date(a.scanned_at) - new Date(b.scanned_at));
    for(let i=1; i<sorted.length; i++){
      const gap = new Date(sorted[i].scanned_at) - new Date(sorted[i-1].scanned_at);
      if(gap < 10*60*1000){ dups.add(sorted[i].gtin); break; }
    }
  });
  return dups;
}

function expiryBadge(dateStr){
  if(!dateStr) return null;
  const exp = new Date(dateStr);
  const now = new Date();
  const days = Math.floor((exp - now) / 86400000);
  if(days < 0) return { label:`Expired ${dateStr}`, cls:'expired' };
  if(days <= EXPIRY_WARN_DAYS) return { label:`Exp ${dateStr} (${days}d)`, cls:'soon' };
  return { label:`Exp ${dateStr}`, cls:'' };
}

let cvRouter = null;

  document.body.insertAdjacentHTML('beforeend', `

      <div class="scanner-hint">Works for medicine boxes (2D code) and cosmetics (barcode)</div>
    </div>
  `);
  startScanning();

function closeScanner(){
  (async () => {
    try{ if(cvRouter) await cvRouter.stopCapturing(); }catch(e){}
    try{ if(cameraEnhancer) await cameraEnhancer.close(); }catch(e){}
  })();
  const overlay = document.getElementById('scannerOverlay');
  if(overlay) overlay.remove();
}

async function startScanning(){
  const statusEl = document.getElementById('scanStatus');
  try{
    if(!window.Dynamsoft){
      throw new Error('Scanner engine failed to load. Check your internet connection and reload.');
    }

    // A built-in trial license is used automatically if none is configured.
    // For production beyond the trial window, request a free 30-day key at
    // dynamsoft.com and set it here via Dynamsoft.License.LicenseManager.initLicense("KEY").

    if(!dbrInitialized){
      cameraView = await Dynamsoft.DCE.CameraView.createInstance();
      cameraEnhancer = await Dynamsoft.DCE.CameraEnhancer.createInstance(cameraView);
      cvRouter = await Dynamsoft.CVR.CaptureVisionRouter.createInstance();
      cvRouter.setInput(cameraEnhancer);

      cvRouter.addResultReceiver({
        onDecodedBarcodesReceived: (result) => {
          if(result.barcodeResultItems && result.barcodeResultItems.length > 0){
            const item = result.barcodeResultItems[0];
            const now = Date.now();
            if(now - lastScanTime < 1500) return;
            lastScanTime = now;
            handleScanResult(item.text, item.formatString);
          }
        }
      });
      dbrInitialized = true;
    }

    const container = document.getElementById('dceVideoContainer');
    container.appendChild(cameraView.getUIElement());

    await cameraEnhancer.open();
    await cvRouter.startCapturing('ReadSingleBarcode');
    if(statusEl) statusEl.textContent = '';
  }catch(e){
    console.error('Scanner init error:', e);
    if(statusEl) statusEl.textContent = `Camera error: ${e.name || ''} ${e.message || e}`;
  }
}


/* ======================= GS1 PARSING ======================= */
// Parses GS1 Application Identifier strings from DataMatrix codes.
// AIs can appear in ANY order on real-world packaging (confirmed from live scans:
// some boxes use 01-17-10-21, others use 01-10-11-17-21). Fixed-length AIs (01, 17, 11)
// have a known field length; variable-length AIs (10 batch, 21 serial, etc.) run until
// the next FNC1 group-separator character or end of string — never assume position.
const GS1_FIXED_LENGTH_AIS = { '00': 18, '01': 14, '11': 6, '13': 6, '15': 6, '17': 6 };
function parseGS1(raw){
  const GS = String.fromCharCode(29);
  let s = raw.replace(/^\]d2/i,'').replace(/^\]C1/i,'').replace(/#/g, GS); // strip symbology id, normalize literal '#' separator
  const result = { gtin:null, expiry:null, productionDate:null, batch:null, serial:null };
  let i = 0;
  while(i < s.length - 1){
    const ai = s.substr(i,2);
    if(GS1_FIXED_LENGTH_AIS.hasOwnProperty(ai)){
      const len = GS1_FIXED_LENGTH_AIS[ai];
      const value = s.substr(i+2, len);
      if(ai === '01') result.gtin = value;
      else if(ai === '17') result.expiry = gs1DateToISO(value);
      else if(ai === '11') result.productionDate = gs1DateToISO(value);
      i += 2 + len;
      if(s[i] === GS) i++; // optional trailing separator even on fixed-length fields
    } else if(ai === '10' || ai === '21' || ai === '22' || ai === '30'){
      let j = i+2, end = s.indexOf(GS, j);
      if(end === -1) end = s.length;
      const value = s.substring(j, end);
      if(ai === '10') result.batch = value;
      else if(ai === '21') result.serial = value;
      i = (end < s.length) ? end+1 : end;
    } else {
      i++; // unrecognized AI char — advance one position to avoid an infinite loop, keep scanning
    }
  }
  return result;
}
function gs1DateToISO(ymd){
  if(!/^\d{6}$/.test(ymd)) return null;
  let yy = parseInt(ymd.substr(0,2),10);
  const mm = ymd.substr(2,2);
  let dd = ymd.substr(4,2);
  const year = yy <= 50 ? 2000+yy : 1900+yy;
  if(dd === '00') dd = '01';
  return `${year}-${mm}-${dd}`;
}

/* ======================= SCAN RESULT HANDLING ======================= */
// formatString from Dynamsoft tells us what kind of code this was:
// DATAMATRIX (medicines, GS1-encoded) vs EAN_13/UPC_A/UPC_E/EAN_8 (cosmetics, plain product code).
const ONED_FORMATS = ['EAN_13', 'EAN_8', 'UPC_A', 'UPC_E'];

async function handleScanResult(rawText, formatString){
  closeScanner();

  let parsed;
  if(ONED_FORMATS.includes(formatString)){
    // Cosmetic-style barcode: the raw text IS the product code directly. No GS1 fields to extract.
    parsed = { gtin: rawText.trim(), expiry: null, batch: null, isCosmetic: true };
  } else {
    // Medicine-style DataMatrix: parse GS1 AI structure for GTIN + expiry + batch.
    parsed = parseGS1(rawText);
    parsed.isCosmetic = false;
    if(!parsed.gtin) parsed.gtin = rawText.trim(); // fallback if AI parsing found nothing recognizable
  }

  // Look up existing GTIN -> product_id mapping, then fetch the catalog name separately (avoids relying on join syntax)
  const { data: mapping } = await sb
    .from('products')
    .select('product_id')
    .eq('gtin', parsed.gtin)
    .maybeSingle();

  if(mapping && mapping.product_id){
    const { data: cat } = await sb
      .from('catalog')
      .select('product_id, product_title')
      .eq('product_id', mapping.product_id)
      .maybeSingle();
    openEntrySheet(parsed, cat ? { product_id: cat.product_id, product_title: cat.product_title } : null);
  } else {
    openEntrySheet(parsed, null);
  }
}

          <button class="btn secondary" onclick="document.getElementById('clearSheet').remove()">Cancel</button>
          <button class="btn danger" onclick="doClearAll()">Delete All</button>
        </div>
      </div>
    </div>
  `);
}
async function doClearAll(){
  await sb.from('stock_counts').delete().neq('id', '00000000-0000-0000-0000-000000000000');
  document.getElementById('clearSheet')?.remove();
  showToast('All counts cleared');
  renderTabContent();
}

/* ======================= UTIL ======================= */
function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1800);
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return String(s).replace(/'/g, "\\'"); }

boot();
</script>
</body>
